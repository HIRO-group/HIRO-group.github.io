<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}" />
    <meta name="viewport" content="width=device-width">{% if page.description %}
    <meta name="description"        content="{{ page.description }}">{% endif %}{% if page.description %}
    <meta property="og:description" content="{{ page.description }}">{% endif %}
    <meta name="google-site-verification" content="FmJO1IL7vp9BDzG5P2e4etTydX3u0BvAUmsaN1_jrXg" />
    <link rel="canonical" href="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}">
    <meta property="og:url" content="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}" />

    {% if page.type == "article" && page.img %}
    <meta name="thumbnail"    content="/img/portfolio/{{ page.img }}" />
    <!-- <meta property="og:image" content="{{ /img/portfolio/{{ page.img }} | prepend: site.baseurl }}" /> -->
    {% else %}
    <meta name="thumbnail"    content="{{ site.logo }}" />
    <!-- <meta property="og:image" content="{{ site.logo }}" /> -->
    {% endif %}

    <!-- Custom CSS & Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <link rel="stylesheet" href="{{ "/style.css" | prepend: site.baseurl }}">

    <!-- Custom Fonts -->
    <script src="https://kit.fontawesome.com/90c4b693bd.js" crossorigin="anonymous"></script>
    <!-- <link href="https://fonts.googleapis.com/css?family=Assistant:300,600" rel="stylesheet"> -->
    <!-- <link href="https://fonts.googleapis.com/css?family=Muli:300,600" rel="stylesheet">
    <link href="//cdn.jsdelivr.net/font-hack/2.019/css/hack-extended.min.css" rel="stylesheet" type="text/css"> -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="shortcut icon" href="/img/fav/favicon.ico">          <!-- 16x16 -->
    <link rel="shortcut icon" href="/img/fav/favicon.png">          <!-- 32x32 -->
    <link rel="icon" type="image/png" href="/img/fav/favicon-32x32.png" sizes="32x32">
    <link rel="icon" type="image/png" href="/img/fav/favicon-96x96.png" sizes="96x96">
    <link rel="icon" type="image/png" href="/img/fav/favicon-16x16.png" sizes="16x16">
    <meta name="msapplication-TileColor" content="#{{ site.color.primary }}">
    <meta name="msapplication-TileImage" content="/img/fav/mstile-144x144.png">

    <!-- Global site tag (gtag.js) - Google Analytics -->
    <!-- <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google-analytics-id }}"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', '{{ site.google-analytics-id }}');
    </script> -->

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google-analytics-id }}"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', '{{ site.google-analytics-id }}');
    </script>
    <!-- Mathjax Support -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/4.0.0/startup.js" integrity="sha512-bTOpOLAF7Z74dLZ3Z3jfQE7SH0mFuuneuOQR+/3EP811prUfVzgtQLPAnIFGlAXc5fs9b1dIjfi8zd4Px1xrAQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>
